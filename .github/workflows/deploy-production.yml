name: Deploy Orbit to Cloudflare

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: orbit-production
  cancel-in-progress: true

jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      scope: ${{ steps.scope.outputs.scope }}
    steps:
      - name: Checkout history for trusted path classification
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Test the fail-safe classifier
        run: npm run actions:scope:test

      - name: Classify changed paths
        id: scope
        env:
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" == 'workflow_dispatch' || -z "$BEFORE_SHA" || "$BEFORE_SHA" =~ ^0+$ ]]; then
            printf 'scope=full\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA" | node scripts/orbit-actions-scope.mjs

  frontend:
    needs: classify
    if: ${{ needs.classify.outputs.scope != 'docs' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout exact production candidate
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and verify the production frontend once
        run: npm run verify:frontend:production

      - name: Create the verified asset manifest
        run: |
          find dist/client -type f -print0 \
            | sort -z \
            | xargs -0 sha256sum > production-assets.sha256
          sha256sum --check production-assets.sha256

      - name: Upload verified production assets
        uses: actions/upload-artifact@v6
        with:
          name: orbit-production-assets-${{ github.sha }}
          path: |
            dist/client
            production-assets.sha256
          if-no-files-found: error
          retention-days: 1

  backend:
    needs: classify
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout backend candidate
        if: ${{ needs.classify.outputs.scope == 'full' }}
        uses: actions/checkout@v7

      - name: Set up Node
        if: ${{ needs.classify.outputs.scope == 'full' }}
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: ${{ needs.classify.outputs.scope == 'full' }}
        run: npm ci

      - name: Verify D1, Worker, CLI and security behavior
        if: ${{ needs.classify.outputs.scope == 'full' }}
        run: npm run test:d1 && npm run orbit:test:cli

      - name: Record frontend-only backend decision
        if: ${{ needs.classify.outputs.scope != 'full' }}
        run: echo 'No backend/security path changed; the fail-safe classifier selected frontend validation.'

  deploy:
    needs:
      - classify
      - frontend
      - backend
    if: ${{ needs.frontend.result == 'success' && needs.backend.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    environment:
      name: production
      url: https://orbit.sametbasbug.dev

    steps:
      - name: Checkout the verified commit
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install deployment dependencies
        run: npm ci

      - name: Download verified production assets
        uses: actions/download-artifact@v7
        with:
          name: orbit-production-assets-${{ github.sha }}
          path: .

      - name: Verify artifact and commit identity
        run: |
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          sha256sum --check production-assets.sha256

      - name: Deploy the verified main artifact
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ORBIT_LIVE_OAUTH_CLIENT_ID: ${{ secrets.ORBIT_LIVE_OAUTH_CLIENT_ID }}
          ORBIT_LIVE_OAUTH_CLIENT_SECRET: ${{ secrets.ORBIT_LIVE_OAUTH_CLIENT_SECRET }}
        run: |
          if [[ -z "$ORBIT_LIVE_OAUTH_CLIENT_ID" || -z "$ORBIT_LIVE_OAUTH_CLIENT_SECRET" ]]; then
            echo 'Live GitHub OAuth deployment secrets are missing.' >&2
            exit 1
          fi

          oauth_secrets_file="$(mktemp)"
          trap 'rm -f "$oauth_secrets_file"' EXIT
          chmod 600 "$oauth_secrets_file"
          jq -n '{
            GITHUB_OAUTH_CLIENT_ID: env.ORBIT_LIVE_OAUTH_CLIENT_ID,
            GITHUB_OAUTH_CLIENT_SECRET: env.ORBIT_LIVE_OAUTH_CLIENT_SECRET
          }' > "$oauth_secrets_file"
          unset ORBIT_LIVE_OAUTH_CLIENT_ID ORBIT_LIVE_OAUTH_CLIENT_SECRET

          short_sha="${GITHUB_SHA::12}"
          npx wrangler deploy \
            --config wrangler.production.live.jsonc \
            --secrets-file "$oauth_secrets_file" \
            --tag "main-${short_sha}" \
            --message "Automatic production deploy from main ${short_sha}"

      - name: Verify the live site
        run: |
          health="$(curl --fail --silent --show-error \
            --retry 8 --retry-delay 3 --retry-all-errors \
            https://orbit.sametbasbug.dev/healthz)"

          HEALTH="$health" node -e '
            const health = JSON.parse(process.env.HEALTH);
            if (health.ok !== true || health.service !== "orbit-v6" || health.environment !== "production") {
              throw new Error(`Unexpected health response: ${JSON.stringify(health)}`);
            }
          '

          headers="$(mktemp)"
          trap 'rm -f "$headers"' EXIT
          curl --fail --silent --show-error \
            --retry 8 --retry-delay 3 --retry-all-errors \
            --dump-header "$headers" --output /dev/null \
            https://orbit.sametbasbug.dev/

          grep -qi '^cf-ray:' "$headers"
          if grep -qi '^server: GitHub.com' "$headers"; then
            echo 'Live Orbit unexpectedly resolved to GitHub Pages.' >&2
            exit 1
          fi
          if grep -qi '^x-robots-tag:.*noindex' "$headers"; then
            echo 'Live Orbit unexpectedly returned a noindex header.' >&2
            exit 1
          fi
