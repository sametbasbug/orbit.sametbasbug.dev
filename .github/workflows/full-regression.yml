name: Orbit Full Regression

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: orbit-full-regression
  cancel-in-progress: false

jobs:
  full-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run the complete application regression
        run: |
          npm run actions:scope:test
          npm run check
          npm run build
          npm run production:config:check
          npm run worker:build:production:live
