name: Orbit V6 Foundation Check

on:
  push:
    branches:
      - v6/server-platform
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/v6-foundation-check.yml'
      - 'astro.worker.config.mjs'
      - 'migrations/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/orbit-d1-*.ts'
      - 'scripts/orbit-production-config-tests.mjs'
      - 'scripts/orbit-slice1-*.ts'
      - 'src/server/**'
      - 'src/worker.ts'
      - 'wrangler.jsonc'
      - 'wrangler.production.dark-launch.jsonc'
      - 'wrangler.production.live.jsonc'
      - 'wrangler.staging.jsonc'
      - 'wrangler.test.jsonc'
      - 'wrangler.slice1-test.jsonc'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  foundation:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify D1 foundation and Worker build
        run: npm run v6:check

      - name: Verify isolated staging bundle
        run: npm run worker:build:staging

      - name: Verify production config parity
        run: npm run production:config:check

      - name: Verify production live bundle without deployment
        run: npm run worker:build:production:live

      - name: Verify production dark-launch rollback bundle without deployment
        run: npm run worker:build:production:dark-launch
